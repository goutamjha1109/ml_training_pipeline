name: ML Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  train-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      - name: Run DVC pipeline
        run: dvc repro

      - name: Show metrics
        run: dvc metrics show

      - name: Compare metrics with previous run
        run: dvc metrics diff HEAD~1 || true

      - name: Commit metrics back to repo
        if: github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/metrics.json reports/metrics.md dvc.lock
          git diff --staged --quiet || git commit -m "update metrics [skip ci]"
          git push